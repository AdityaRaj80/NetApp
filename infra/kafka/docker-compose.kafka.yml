services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: netapp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [infra_netapp_net]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: netapp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"     # host access (optional)
    environment:
      KAFKA_ZOOKEEPER_CONNECT: "netapp-zookeeper:2181"
      # Two listeners: one INTERNAL for containers, one EXTERNAL for host tools
      KAFKA_LISTENERS: "PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT_INTERNAL://netapp-kafka:29092,PLAINTEXT://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT_INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [infra_netapp_net]

networks:
  infra_netapp_net:
    external: true
